<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>自爆磁怪 + 电肚蛙 ex 牌组</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .meta-info {
            text-align: center;
            color: #aaa;
            margin-bottom: 20px;
        }
        .badge {
            display: inline-block;
            background: #4ade80;
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th {
            background: rgba(255,255,255,0.1);
            color: #ffd700;
        }
        .pokemon { color: #98fb98; }
        .trainer { color: #87ceeb; }
        .energy { color: #ffa500; }
        .qty {
            display: inline-block;
            background: #ffd700;
            color: #000;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            font-weight: bold;
            margin-right: 8px;
        }
        .section-title {
            color: #ffd700;
            font-size: 1.2em;
            margin: 20px 0 10px 0;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 5px;
        }
    </style>
</head>

        <table>

            <tr><td class="pokemon">三合一磁怪</td><td><span class="qty">2</span></td><td>A1-98</td></tr>

            <tr><td class="pokemon">花舞鸟</td><td><span class="qty">1</span></td><td>A3-66</td></tr>

</html>
